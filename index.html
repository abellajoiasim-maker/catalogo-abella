<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Categorias</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="js/firebase.js"></script>
</head>
<body class="bg-black text-white p-4">

<h1 class="text-center text-xl text-[#caa85c] mb-4">Categorias</h1>

<input id="busca" placeholder="Buscar categoria" class="w-full p-2 mb-4 text-black">

<div id="cats" class="grid grid-cols-2 gap-3"></div>

<script>
db.ref('categories').on('value', snap=>{
 let dados = [];
 snap.forEach(c=> dados.push({id:c.key,...c.val()}));

 function render(lista){
  cats.innerHTML="";
  lista.forEach(cat=>{
   cats.innerHTML += `
   <div onclick="abrir('${cat.id}')" class="bg-[#141414] p-3 rounded-xl cursor-pointer">
   <img src="${cat.image}" class="h-24 w-full object-cover rounded">
   <p>${cat.name}</p>
   </div>`;
  });
 }

 render(dados);

 busca.oninput = () =>{
  const f = busca.value.toLowerCase();
  render(dados.filter(c=>c.name.toLowerCase().includes(f)));
 }
});

function abrir(id){
 location.href = "produtos.html?cat="+id;
}
</script>
</body>
</html>
