<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abella Joias</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial}
.card{border-radius:14px;overflow:hidden;background:#141414}
</style>
</head>

<body>

<!-- 🔥 HEADER FIXO -->
<div class="fixed top-0 left-0 right-0 bg-black p-3 flex justify-between items-center z-50 border-b border-gray-800">
  <span class="text-[#caa85c] font-bold">ABELLA</span>

  <div class="flex gap-2">
    <a href="galvanicas.html" class="text-xs bg-[#222] px-3 py-1 rounded">🏭</a>
    <a href="carrinho.html" class="text-xs bg-[#caa85c] text-black px-3 py-1 rounded font-bold">
      🛒 <span id="totalBar">0</span>
    </a>
  </div>
</div>

<div class="pt-16 px-3">

<!-- 🔥 BANNER (VENDA) -->
<div class="bg-[#caa85c] text-black p-3 rounded-xl text-center mb-3">
  <p class="text-sm font-bold">💎 ATÉ 20% OFF + 5% NO PIX</p>
  <p class="text-xs">Quanto mais você compra, mais economiza</p>
</div>

<!-- 🔍 BUSCA -->
<input 
id="busca"
placeholder="Buscar categoria..."
class="w-full p-3 mb-3 rounded-xl text-black"
/>

<!-- 📦 CATEGORIAS -->
<div id="cats" class="grid grid-cols-2 gap-3"></div>

</div>

<!-- 💬 WHATSAPP FIXO -->
<a href="https://wa.me/5519988207658"
class="fixed bottom-4 left-4 bg-green-500 px-4 py-3 rounded-full shadow-lg">
💬
</a>

<script>
let listaCategorias = [];

db.ref('categories').on('value', snap => {
  listaCategorias = [];
  snap.forEach(c => {
    listaCategorias.push({ id:c.key, ...c.val() });
  });
  render(listaCategorias);
});

function render(lista){
  cats.innerHTML = "";

  lista.forEach(cat => {
    cats.innerHTML += `
    <div onclick="abrir('${cat.id}')" class="card">
      <img src="${cat.image}" class="w-full h-32 object-cover">
      <div class="p-2 text-center">
        <p class="text-sm">${cat.name}</p>
      </div>
    </div>
    `;
  });
}

busca.oninput = () => {
  const termo = busca.value.toLowerCase();
  render(listaCategorias.filter(c =>
    c.name.toLowerCase().includes(termo)
  ));
};

function abrir(id){
  window.location.href = "produtos.html?cat=" + id;
}

atualizarBarra();
</script>

</body>
</html>
