<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Abella Joias</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

<style>
body{background:#0b0b0b;color:#fff}
.cat{border-radius:16px;overflow:hidden;position:relative}
.overlay{
 position:absolute;
 bottom:0;
 width:100%;
 background:linear-gradient(transparent, rgba(0,0,0,0.9));
 text-align:center;
 padding:6px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="fixed top-0 left-0 right-0 bg-black p-3 flex justify-between border-b z-50">
 <span class="text-[#caa85c] font-bold">ABELLA</span>

 <div class="flex gap-2">
  <a href="galvanicas.html" class="bg-[#222] px-3 py-1 rounded text-xs">🏭</a>
  <a href="carrinho.html" class="bg-[#caa85c] text-black px-3 py-1 rounded text-xs">
    🛒 <span id="totalBar">0</span>
  </a>
 </div>
</div>

<div class="pt-16 p-3">

<!-- BANNER -->
<div class="bg-[#caa85c] text-black p-3 rounded-xl text-center mb-3">
 💎 ATÉ 20% OFF + 5% PIX
</div>

<!-- PROGRESSO -->
<div id="progresso" class="text-yellow-400 text-center mb-3 text-sm"></div>

<!-- BUSCA -->
<input id="busca" placeholder="Buscar categoria..."
class="w-full p-2 rounded mb-3 text-black">

<!-- CATEGORIAS -->
<div id="cats" class="grid grid-cols-2 gap-3"></div>

</div>

<script>
let categorias=[];

db.ref('categories').on('value', snap=>{
 categorias=[];
 snap.forEach(c=> categorias.push({id:c.key,...c.val()}));
 render(categorias);
});

function render(lista){
 cats.innerHTML="";
 lista.forEach(cat=>{
  cats.innerHTML+=`
  <div onclick="abrir('${cat.id}')" class="cat">
   <img src="${cat.image}" class="w-full h-32 object-cover">
   <div class="overlay">${cat.name}</div>
  </div>`;
 });
}

busca.oninput=()=>{
 const t=busca.value.toLowerCase();
 render(categorias.filter(c=>c.name.toLowerCase().includes(t)));
}

function abrir(id){
 location.href="produtos.html?cat="+id;
}

// progresso
const {subtotal}=calcularTotal();
if(subtotal<300){
 progresso.innerHTML=`Faltam R$ ${300-subtotal} para 5%`;
}else{
 progresso.innerHTML="🔥 Você já está com desconto ativo!";
}

atualizarBarra();
</script>

</body>
</html>
