<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/app.js"></script>

<style>
body{background:#0b0b0b;color:#fff}
</style>
</head>

<body class="p-4">

<h1 class="text-[#caa85c] mb-4">Carrinho</h1>

<div id="lista"></div>
<div id="resumo" class="mt-4"></div>

<button onclick="finalizar()"
class="bg-[#caa85c] text-black w-full p-3 mt-4 rounded">
Finalizar no WhatsApp
</button>

<script>
function render(){

 lista.innerHTML="";

 carrinho.forEach(i=>{
  lista.innerHTML+=`
  <div class="bg-[#141414] p-3 rounded mb-2">
    <p>${i.name}</p>

    <div class="flex justify-between mt-2">
      <div>
        <button onclick="alterarQtd('${i.id}',-1)">-</button>
        ${i.quantidade}
        <button onclick="alterarQtd('${i.id}',1)">+</button>
      </div>

      <button onclick="removerItem('${i.id}')">🗑</button>
    </div>
  </div>`;
 });

 const t = calcularTotal();

 resumo.innerHTML=`
 <p>Subtotal: ${t.subtotal.toFixed(2)}</p>
 <p>Desconto: ${t.desconto.toFixed(2)}</p>
 <p>PIX: ${t.pix.toFixed(2)}</p>
 <h2 class="text-[#caa85c] font-bold">
 Total: ${t.total.toFixed(2)}
 </h2>`;
}

function finalizar(){

 let msg="*Pedido Abella Joias*%0A";

 carrinho.forEach(i=>{
  msg+=`${i.quantidade}x ${i.name}%0A`;
 });

 window.open("https://wa.me/5519988207658?text="+msg);
}

render();
</script>

</body>
</html>
