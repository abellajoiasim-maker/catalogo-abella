<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="js/app.js"></script>
</head>
<body class="bg-black text-white p-4">

<h1 class="text-[#caa85c]">Carrinho</h1>

<div id="lista"></div>
<div id="resumo"></div>

<button onclick="finalizar()" class="bg-[#caa85c] text-black w-full p-3 mt-4">Finalizar WhatsApp</button>

<script>
function render(){
 lista.innerHTML="";
 let subtotal=0;

 carrinho.forEach(i=>{
  subtotal += i.price * i.quantidade;
  lista.innerHTML += `<p>${i.quantidade}x ${i.name}</p>`;
 });

 let pct = subtotal>=2500?20: subtotal>=1000?15: subtotal>=500?10: subtotal>=300?5:0;
 let desc = subtotal*(pct/100);
 let pix = subtotal>=300 ? subtotal*0.05:0;
 let total = subtotal - desc - pix;

 resumo.innerHTML = `
 <p>Subtotal: ${subtotal.toFixed(2)}</p>
 <p>Desconto: ${desc.toFixed(2)}</p>
 <p>PIX: ${pix.toFixed(2)}</p>
 <h2>Total: ${total.toFixed(2)}</h2>`;
}

function finalizar(){
 let msg="Pedido Abella:%0A";
 carrinho.forEach(i=> msg += `${i.name}%0A`);
 window.open("https://wa.me/5519988207658?text="+msg);
}

render();
</script>
</body>
</html>
